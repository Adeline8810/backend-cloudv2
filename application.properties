

#configuracion para mi local
###########################################
# ===== Conexi�n a MySQL =====

# ===== Configuración de base de datos (Dinámica) =====
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# ===== Configuraci�n JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
   
# ===== Configuraci�n de puerto de la app =====
server.port=${PORT:8080}

# ===== Opcional: formato de logs =====
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB



app.upload.dir=uploads
spring.web.resources.static-locations=file:uploads/








